name: Update ADK Python Docs (izefoea PoC)

on:
  issues:
    types: [opened, reopened, labeled]

# 给予该 Workflow 读写代码和 PR 的权限，替代掉原版专用的 ADK_BOT_GITHUB_TOKEN
permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  update-adk-python-docs-from-issue:
    # 只要 Issue 带这个标签就触发，方便测试
    if: contains(github.event.issue.labels.*.name, 'docs updates')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout ADK Docs repository
        uses: actions/checkout@v4
        with:
          path: ./adk-docs # 将当前 docs 仓库 clone 到特定目录

      - name: Checkout ADK Python repository
        uses: actions/checkout@v4
        with:
          repository: izefoea/adk-python # 替换为你的 Fork
          path: ./adk-python
          # 使用默认的 GITHUB_TOKEN 即可
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # [删除了 Authenticate to Google Cloud 步骤]
      # [删除了 Load adk-bot SSH Private Key 步骤]

      - name: Set Git Config (Identity & Auth Rewrite)
        env:
          # 注入内置的 GitHub Token
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "izefoea-bot"
          git config --global user.email "bot@izefoea.com"
          
          # 核心魔法：强制将所有 git@github.com: (SSH) 替换为带 Token 的 HTTPS
          git config --global url."https://x-access-token:${GITHUB_TOKEN}@github.com/".insteadOf "git@github.com:"
          
          # 以防万一，把普通的 https 也带上 Token 认证
          git config --global url."https://x-access-token:${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-adk
          # 如果 google-adk 包含一些私有依赖，可能需要在 adk-python 目录下本地安装
          # pip install -e ./adk-python

      - name: Run ADK docs updater script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_GENAI_USE_VERTEXAI: 0
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} 
          DOC_OWNER: 'izefoea'
          DOC_REPO: 'adk-docs'
          CODE_OWNER: 'izefoea'
          CODE_REPO: 'adk-python'
          INTERACTIVE: 0
          PYTHONPATH: adk-python/contributing/samples/adk_documentation
        run: |
          # 🚨 终极魔法：直接修改 Python 源码，把写死的 SSH 强行替换为带 Token 的 HTTPS
          sed -i "s/git@github.com:/https:\/\/x-access-token:${GITHUB_TOKEN}@github.com\//g" adk-python/contributing/samples/adk_documentation/tools.py
          
          # 执行主程序
          python -m adk_docs_updater.main --issue_number ${{ github.event.issue.number }}
